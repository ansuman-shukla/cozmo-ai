global:
  scrape_interval: 5s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: backend
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:8000"]

  - job_name: agent
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:9108"]
